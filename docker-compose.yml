services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: afferens-memory-guardian-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-afferens_memory_guardian}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-afferens_memory_guardian}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
